name: bloody
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
version: 1.0.6+6

environment:
  sdk: ^3.0.0 # Adjusted to be more compatible, your previous 3.9.2 might cause issues if not on beta

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  loading_animation_widget: ^1.3.0
  easy_localization: ^3.0.7
  geocoding: ^4.0.0
  timeago: ^3.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Standard lints
  flutter_lints: ^5.0.0

  # ICON GENERATOR PACKAGE
  flutter_launcher_icons: ^0.13.1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # Register the assets folder so the app can use the image inside the app too
  assets:
    - assets/


# --- LAUNCHER ICON CONFIGURATION ---
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/1024.png"
  min_sdk_android: 21 # Helps avoid some legacy Android build issues